spring:
  application:
    name: api-gateway
  datasource:
    url: jdbc:postgresql://postgres-gateway:5432/${GATEWAY_DB_NAME:gateway_db}
    username: ${GATEWAY_DB_USER:gateway_user}
    password: ${GATEWAY_DB_PASS:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  cloud:
    gateway:
      routes:
        # ms-events
        - id: ms-events
          uri: ${MS_EVENTS_URL:http://ms-events:8081}
          predicates:
            - Path=/api/v1/events/**
          filters:
            - StripPrefix=0

        # ms-events rooms
        - id: ms-events-rooms
          uri: ${MS_EVENTS_URL:http://ms-events:8081}
          predicates:
            - Path=/api/v1/rooms/**
          filters:
            - StripPrefix=0

        # ms-ticketing (preparado, no activo aún)
        - id: ms-ticketing
          uri: ${MS_TICKETING_URL:http://ms-ticketing:8082}
          predicates:
            - Path=/api/v1/reservations/**, /api/v1/tickets/**
          filters:
            - StripPrefix=0

        # ms-notifications
        - id: ms-notifications
          uri: ${MS_NOTIFICATIONS_URL:http://ms-notifications:8083}
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=0

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "${FRONTEND_URL:http://localhost:5173}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-Requested-With
              - X-User-Id
            exposedHeaders:
              - X-Role
              - X-User-Id
            allowCredentials: false
            maxAge: 3600

server:
  port: ${GATEWAY_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health, info

jwt:
  secret: ${JWT_SECRET:default-secret-change-in-production-must-be-at-least-32-chars}
  expiration-ms: ${JWT_EXPIRATION_MS:28800000}

admin:
  email: ${ADMIN_EMAIL:admin@example.com}
  password: ${ADMIN_PASSWORD:Admin1234!}

rate-limit:
  login:
    capacity: 5
    refill-minutes: 15
