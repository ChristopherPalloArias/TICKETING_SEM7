spring:
  application:
    name: api-gateway
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: /
  datasource:
    url: jdbc:postgresql://postgres-gateway:5432/${GATEWAY_DB_NAME:gateway_db}
    username: ${GATEWAY_DB_USER:gateway_user}
    password: ${GATEWAY_DB_PASS:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  cloud:
    gateway:
      routes:
        # ms-events
        - id: ms-events
          uri: ${MS_EVENTS_URL:http://ms-events:8081}
          predicates:
            - Path=/api/v1/events/**
          filters:
            - StripPrefix=0

        # ms-events rooms
        - id: ms-events-rooms
          uri: ${MS_EVENTS_URL:http://ms-events:8081}
          predicates:
            - Path=/api/v1/rooms/**
          filters:
            - StripPrefix=0

        # ms-ticketing (preparado, no activo aún)
        - id: ms-ticketing
          uri: ${MS_TICKETING_URL:http://ms-ticketing:8082}
          predicates:
            - Path=/api/v1/reservations/**, /api/v1/tickets/**
          filters:
            - StripPrefix=0

        # ms-notifications
        - id: ms-notifications
          uri: ${MS_NOTIFICATIONS_URL:http://ms-notifications:8083}
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=0

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "${FRONTEND_URL:http://localhost:5173}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-Requested-With
              - X-User-Id
            exposedHeaders:
              - X-Role
              - X-User-Id
            allowCredentials: false
            maxAge: 3600

server:
  port: ${GATEWAY_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health, info

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:28800000}

admin:
  email: ${ADMIN_EMAIL}
  password: ${ADMIN_PASSWORD}

rate-limit:
  login:
    capacity: 5
    refill-minutes: 15
    # Número máximo de IPs rastreadas simultáneamente.
    # Cuando se supera, se eliminan las entradas más antiguas (LinkedHashMap LRU).
    # Protege contra ataques DDoS distribuidos que agotan la memoria.
    max-tracked-ips: 10000
