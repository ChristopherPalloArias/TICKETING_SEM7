services:
  db-events:
    image: postgres:15-alpine
    container_name: db-events
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${EVENTS_DB_NAME}
    ports:
      - "${EVENTS_DB_PORT}:5432"
    volumes:
      - db-events-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${EVENTS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tickets-network
    restart: unless-stopped

  ms-events:
    build:
      context: .
      dockerfile: ./ms-events/Dockerfile
    container_name: ms-events
    depends_on:
      db-events:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${EVENTS_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${EVENTS_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${EVENTS_DATASOURCE_PASSWORD}
    ports:
      - "${EVENTS_PORT}:8081"
    networks:
      - tickets-network
    restart: unless-stopped

  db-ticketing:
    image: postgres:15-alpine
    container_name: db-ticketing
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${TICKETING_DB_NAME}
    ports:
      - "${TICKETING_DB_PORT}:5432"
    volumes:
      - db-ticketing-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${TICKETING_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tickets-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MGMT_PORT}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - tickets-network
    restart: unless-stopped

  ms-ticketing:
    build:
      context: .
      dockerfile: ./ms-ticketing/Dockerfile
    container_name: ms-ticketing
    depends_on:
      db-ticketing:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${TICKETING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${TICKETING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${TICKETING_DATASOURCE_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MS_EVENTS_BASE_URL: http://ms-events:8081
    ports:
      - "${TICKETING_PORT}:8082"
    networks:
      - tickets-network
    restart: unless-stopped

  db-notifications:
    image: postgres:15-alpine
    container_name: db-notifications
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${NOTIFICATIONS_DB_NAME:-notifications_db}
    ports:
      - "${NOTIFICATIONS_DB_PORT:-5435}:5432"
    volumes:
      - db-notifications-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${NOTIFICATIONS_DB_NAME:-notifications_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tickets-network
    restart: unless-stopped

  ms-notifications:
    build:
      context: .
      dockerfile: ./ms-notifications/Dockerfile
    container_name: ms-notifications
    depends_on:
      db-notifications:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-notifications:5432/${NOTIFICATIONS_DB_NAME:-notifications_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    ports:
      - "${NOTIFICATIONS_PORT:-8083}:8083"
    networks:
      - tickets-network
    restart: unless-stopped

networks:
  tickets-network:
    driver: bridge

volumes:
  db-events-data:
  db-ticketing-data:
  db-notifications-data:
  rabbitmq-data:
