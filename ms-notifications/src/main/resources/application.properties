spring.application.name=ms-notifications
server.port=8083

# ─── PostgreSQL ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME_NOTIFICATIONS:notifications_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ─── Flyway ──────────────────────────────────────────────────────────────────
spring.flyway.baselineOnMigrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=true

# ─── RabbitMQ ────────────────────────────────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=/
spring.rabbitmq.connection-timeout=10000ms
# NOTE: acknowledge-mode and prefetch are set programmatically in RabbitMQConfig
# because a custom SimpleRabbitListenerContainerFactory bean overrides Spring Boot
# auto-configuration — spring.rabbitmq.listener.simple.* properties are ignored.

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.tickets.msnotifications=DEBUG
logging.level.org.springframework.web=INFO
