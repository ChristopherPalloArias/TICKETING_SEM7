spring.application.name=ms-ticketing
server.port=8082

# H2 Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway disabled for tests
spring.flyway.enabled=false

# RabbitMQ (disabled or mocked)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# WebClient Configuration (point to mock or test ms-events)
clients.ms-events.base-url=http://localhost:8081

# Logging
logging.level.root=INFO
logging.level.com.tickets.msticketing=DEBUG
